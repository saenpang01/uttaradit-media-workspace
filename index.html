<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ห้องทำงาน อาสาแมวส้ม</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Serif+Thai:wght@500;700;900&family=Noto+Sans+Thai:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap');

:root{
  --ink:#FBEFE4;
  --ink-soft:#C9B8A8;
  --paper:#15100C;
  --paper-raised:#211A13;
  --gold:#FF9D4D;
  --gold-deep:#FF7A1F;
  --green-unripe:#9BC97A;
  --red-ripe:#FF6B6B;
  --line:#3A2E22;
  --shadow: 0 4px 18px rgba(0,0,0,0.45);
}
*{box-sizing:border-box; margin:0; padding:0;}
body{
  font-family:'Noto Sans Thai', sans-serif;
  background:var(--paper);
  color:var(--ink);
  min-height:100vh;
}
::selection{background:var(--gold); color:var(--paper-raised);}

/* ---------- Header ---------- */
header{
  padding:20px 24px 16px;
  border-bottom:2px solid var(--gold-deep);
  background:var(--paper-raised);
  position:sticky; top:0; z-index:20;
}
.brand{
  display:flex; align-items:center; gap:10px; flex-wrap:wrap;
}
.brand-logo{
  width:36px; height:36px; border-radius:50%;
  object-fit:cover;
  border:2px solid var(--gold-deep);
}
.brand h1{
  font-family:'Noto Serif Thai', serif;
  font-weight:900;
  font-size:22px;
  letter-spacing:0.3px;
  color:var(--gold);
}
.brand .tag{
  font-family:'IBM Plex Mono', monospace;
  font-size:11px;
  color:var(--gold);
  background:rgba(255,157,77,0.15);
  padding:2px 8px;
  border-radius:100px;
  border:1px solid var(--gold);
}
.subline{
  margin-top:4px;
  font-size:12.5px;
  color:var(--ink-soft);
}

.view-switch{
  display:flex; gap:6px; margin-top:14px;
}
.view-switch button{
  font-family:'Noto Sans Thai', sans-serif;
  font-weight:600;
  font-size:13.5px;
  padding:8px 16px;
  border-radius:8px;
  border:1.5px solid var(--line);
  background:transparent;
  color:var(--ink);
  cursor:pointer;
  transition:all .15s ease;
}
.view-switch button.active{
  background:var(--gold-deep);
  border-color:var(--gold-deep);
  color:var(--paper);
}
.add-btn{
  margin-left:auto;
  font-family:'Noto Sans Thai', sans-serif;
  font-weight:700;
  font-size:13.5px;
  padding:8px 18px;
  border-radius:8px;
  border:none;
  background:var(--gold-deep);
  color:#fff;
  cursor:pointer;
  box-shadow:var(--shadow);
}
.add-btn:hover{background:var(--gold);}

.header-row{display:flex; align-items:center; gap:6px; flex-wrap:wrap;}

/* ---------- Main ---------- */
main{padding:20px 24px 60px; max-width:1400px; margin:0 auto;}

.hint{
  font-size:12.5px; color:var(--ink-soft); margin-bottom:16px;
  font-family:'IBM Plex Mono', monospace;
}

/* ---------- Stats bar ---------- */
.stats-bar{
  display:flex; flex-wrap:wrap; gap:8px;
  margin-bottom:16px;
}
.stat-chip{
  display:flex; align-items:baseline; gap:6px;
  background:var(--paper-raised);
  border:1.5px solid var(--line);
  border-left:4px solid var(--chip-color, var(--ink));
  border-radius:8px;
  padding:7px 12px;
}
.stat-chip .num{
  font-family:'IBM Plex Mono', monospace;
  font-weight:700;
  font-size:16px;
  color:var(--chip-color, var(--ink));
}
.stat-chip .lbl{
  font-size:12px;
  color:var(--ink-soft);
}
.stat-chip.total{ border-left-color:var(--ink); }
.stat-chip.pending{
  border-left-color:var(--red-ripe);
  background:var(--paper-raised);
}
.stat-chip.pending .num{ color:var(--red-ripe); }

/* ---------- Board ---------- */
.board{
  display:grid;
  grid-template-columns:repeat(5, minmax(0,1fr));
  gap:10px;
}
@media (max-width:900px){
  .board{grid-template-columns:1fr; overflow-x:visible;}
}
.column{
  background:var(--paper-raised);
  border:1.5px solid var(--line);
  border-radius:12px;
  min-height:200px;
  display:flex; flex-direction:column;
}
.column-head{
  padding:12px 14px;
  border-bottom:2px solid var(--col-color, var(--ink));
  display:flex; align-items:center; justify-content:space-between;
}
.column-head h3{
  font-family:'Noto Serif Thai', serif;
  font-size:15px;
  font-weight:700;
  color:var(--col-color, var(--ink));
}
.column-head .count{
  font-family:'IBM Plex Mono', monospace;
  font-size:12px;
  color:var(--ink-soft);
}
.next-hint{
  font-family:'IBM Plex Mono', monospace;
  font-size:10.5px;
  color:var(--ink-soft);
  margin-top:3px;
  opacity:0.8;
}
.next-hint.final{ color:var(--gold-deep); }
.column-body{
  padding:10px;
  display:flex; flex-direction:column; gap:8px;
  flex:1;
  border-radius:0 0 12px 12px;
  transition:background .12s ease;
}
.column-body.drag-over{ background:rgba(255,157,77,0.12); }
.empty-col{
  font-size:12px; color:var(--ink-soft); text-align:center; padding:20px 6px; opacity:0.7;
}

.pool-filter{
  display:flex; flex-wrap:wrap; gap:8px; margin-bottom:16px;
}
.pf-btn{
  font-family:'Noto Sans Thai', sans-serif; font-size:12.5px; font-weight:600;
  padding:7px 14px; border-radius:100px; border:1.5px solid var(--line);
  background:transparent; color:var(--ink-soft); cursor:pointer;
}
.pf-btn.active{ background:var(--gold-deep); border-color:var(--gold-deep); color:var(--paper); }

.card{
  background:var(--paper-raised);
  border:1px solid var(--line);
  border-left:4px solid var(--cat-color, var(--gold));
  border-radius:8px;
  padding:10px 12px;
  cursor:grab;
  transition:transform .12s ease, box-shadow .12s ease, opacity .12s ease;
}
.card:hover{transform:translateY(-1px); box-shadow:var(--shadow);}
.card.dragging{ opacity:0.4; }
.card .title{
  font-size:14px; font-weight:600; line-height:1.4; margin-bottom:6px;
}
.card .meta{
  display:flex; justify-content:space-between; align-items:center;
  font-size:11px; color:var(--ink-soft);
}
.card .meta .unclaimed{ font-style:italic; opacity:0.7; }
.card .due{
  font-family:'IBM Plex Mono', monospace;
}
.card .due.overdue{color:var(--red-ripe); font-weight:700;}
.card-actions{
  display:flex; gap:6px; margin-top:8px;
}
.card-btn{
  flex:1; font-family:'Noto Sans Thai', sans-serif; font-size:11px; font-weight:600;
  padding:6px 8px; border-radius:6px; border:1px solid var(--line);
  background:transparent; color:var(--ink-soft); cursor:pointer;
}
.card-btn:hover{ border-color:var(--gold); color:var(--gold); }
.card-btn.claim{ border-color:var(--gold-deep); color:var(--gold-deep); }
.card-btn.advance{ background:var(--gold-deep); border-color:var(--gold-deep); color:var(--paper); }

/* ---------- Calendar ---------- */
.cal-head{
  display:flex; align-items:center; gap:12px; margin-bottom:14px;
}
.cal-head button{
  width:32px; height:32px; border-radius:8px; border:1.5px solid var(--line);
  background:var(--paper-raised); color:var(--ink); cursor:pointer; font-size:15px;
}
.cal-head h2{
  font-family:'Noto Serif Thai', serif; font-size:19px; font-weight:700; color:var(--gold);
}
.cal-gcal-link{
  margin-left:auto;
  font-family:'IBM Plex Mono', monospace;
  font-size:11.5px; color:var(--ink-soft); text-decoration:none;
}
.cal-gcal-link:hover{ color:var(--gold); text-decoration:underline; }
.cal-grid{
  display:grid;
  grid-template-columns:repeat(7,1fr);
  gap:6px;
}
.cal-dow{
  font-family:'IBM Plex Mono', monospace;
  font-size:11px; text-align:center; color:var(--ink-soft); padding-bottom:4px;
}
.cal-cell{
  background:var(--paper-raised);
  border:1px solid var(--line);
  border-radius:8px;
  min-height:92px;
  padding:6px;
  display:flex; flex-direction:column; gap:3px;
}
.cal-cell.outside{opacity:0.35;}
.cal-cell.today{border:2px solid var(--gold-deep);}
.cal-daynum{
  font-family:'IBM Plex Mono', monospace;
  font-size:11.5px; font-weight:600; color:var(--ink-soft);
}
.cal-task{
  font-size:10.5px;
  background:var(--cat-color, var(--gold));
  color:var(--paper);
  border-radius:4px;
  padding:2px 5px;
  cursor:pointer;
  overflow:hidden; text-overflow:ellipsis; white-space:nowrap;
}
@media (max-width:700px){
  .cal-grid{grid-template-columns:repeat(7,minmax(38px,1fr)); gap:3px;}
  .cal-cell{min-height:60px; padding:3px;}
  .cal-task{font-size:9px;}
}

/* ---------- News feed (Facebook post style) ---------- */
.news-feed{
  display:flex; flex-direction:column; gap:14px;
  max-width:520px;
  margin:0 auto;
}
.news-card{
  background:var(--paper-raised);
  border:1px solid var(--line);
  border-left:4px solid var(--cat-color, var(--gold));
  border-radius:10px;
  padding:12px 14px 8px;
  color:var(--ink);
}
.news-card-head{
  display:flex; align-items:center; gap:9px;
  margin-bottom:10px;
}
.news-avatar{
  width:34px; height:34px; border-radius:50%; object-fit:cover; flex-shrink:0;
}
.news-headtext{ min-width:0; }
.news-page-name{
  font-size:13px; font-weight:700; display:flex; align-items:center; gap:6px; flex-wrap:wrap;
}
.news-cat{
  font-family:'IBM Plex Mono', monospace;
  font-size:10px; font-weight:600;
  color:var(--cat-color, var(--gold-deep));
  background:rgba(255,157,77,0.12);
  border-radius:100px; padding:1px 8px;
}
.news-time{
  font-size:11px; color:var(--ink-soft); margin-top:1px;
}
.news-title{
  font-size:14.5px; font-weight:500; line-height:1.55; margin-bottom:10px;
  white-space:pre-line;
}
.news-media{
  display:block; margin:0 -14px 10px; border-top:1px solid var(--line); border-bottom:1px solid var(--line);
}
.news-media img{
  width:100%; max-height:320px; object-fit:cover; display:block;
}
.news-poster{
  display:flex; align-items:center; justify-content:center; text-align:center;
  margin:0 -14px 10px;
  aspect-ratio:1.91/1;
  background:var(--cat-color, var(--gold));
  padding:20px;
  text-decoration:none;
}
.news-poster span{
  font-family:'Noto Serif Thai', serif;
  font-size:22px; font-weight:900; line-height:1.35;
  color:var(--paper);
}
.news-reason{
  font-size:12px; color:var(--ink-soft); line-height:1.5; margin-bottom:10px;
}
.news-actions{
  display:flex; border-top:1px solid var(--line); margin:0 -14px; padding:2px 14px 0;
}
.news-action-btn{
  flex:1; text-align:center;
  font-family:'Noto Sans Thai', sans-serif; font-size:12px; font-weight:600;
  padding:9px 4px; border:none; background:transparent; color:var(--ink-soft);
  cursor:pointer; text-decoration:none; border-radius:6px;
}
.news-action-btn:hover{ background:rgba(255,157,77,0.1); color:var(--gold); }
.news-action-btn:disabled{ opacity:0.6; cursor:default; }
.load-more-btn{
  display:block; margin:16px auto 0; max-width:200px;
}

/* ---------- Modal ---------- */
.overlay{
  position:fixed; inset:0; background:rgba(0,0,0,0.6);
  display:flex; align-items:center; justify-content:center;
  z-index:100; padding:16px;
}
.modal{
  background:var(--paper-raised);
  border-radius:14px;
  padding:22px;
  width:100%; max-width:440px;
  max-height:88vh; overflow-y:auto;
  box-shadow:0 10px 40px rgba(0,0,0,0.5);
}
.modal h3{
  font-family:'Noto Serif Thai', serif; font-size:18px; margin-bottom:16px;
}
.drive-link{
  display:inline-block; margin:-8px 0 16px; font-size:12.5px; font-weight:600;
  color:var(--gold); text-decoration:none;
}
.drive-link:hover{ text-decoration:underline; }
.drive-link-pending{
  margin:-8px 0 16px; font-size:11.5px; color:var(--ink-soft);
}
.field{margin-bottom:12px;}
.field label{
  display:block; font-size:12px; font-weight:600; color:var(--ink-soft); margin-bottom:5px;
}
.field input, .field select, .field textarea{
  width:100%; padding:9px 10px; border-radius:8px;
  border:1.5px solid var(--line); background:var(--paper);
  font-family:'Noto Sans Thai', sans-serif; font-size:13.5px; color:var(--ink);
}
.field textarea{resize:vertical; min-height:60px;}
.modal-actions{
  display:flex; gap:8px; margin-top:18px; align-items:center;
}
.btn{
  flex:1; padding:10px; border-radius:8px; border:none; font-weight:700;
  font-size:13.5px; cursor:pointer; font-family:'Noto Sans Thai', sans-serif;
}
.btn-primary{background:var(--gold-deep); color:#fff;}
.btn-primary:hover{background:var(--gold);}
.btn-ghost{background:transparent; border:1.5px solid var(--line); color:var(--ink);}
.btn-danger{background:transparent; color:var(--red-ripe); border:1.5px solid var(--red-ripe); flex:0 0 auto; padding:10px 14px;}

.loading{text-align:center; padding:60px 0; color:var(--ink-soft); font-family:'IBM Plex Mono', monospace; font-size:13px;}
.err{color:var(--red-ripe); font-size:12px; margin-top:6px;}
</style>
</head>

const THAI_MONTHS = ['มกราคม','กุมภาพันธ์','มีนาคม','เมษายน','พฤษภาคม','มิถุนายน','กรกฎาคม','สิงหาคม','กันยายน','ตุลาคม','พฤศจิกายน','ธันวาคม'];
const THAI_DOW = ['อา','จ','อ','พ','พฤ','ศ','ส'];

function statusInfo(id){ return STATUSES.find(s=>s.id===id) || STATUSES[0]; }
function uid(){ return 'task_' + Date.now() + '_' + Math.random().toString(36).slice(2,8); }

async function loadTasks(){
  try{
    const res = await fetch(APPS_SCRIPT_URL, { method:'GET' });
    const data = await res.json();
    tasks = (data && data.ok && Array.isArray(data.tasks)) ? data.tasks : [];
  }catch(e){
    console.error('load failed', e);
    tasks = [];
    document.getElementById('root').innerHTML = '<div class="loading">โหลดข้อมูลจาก Google Sheet ไม่สำเร็จ ลองรีเฟรชหน้าอีกครั้ง</div>';
    return;
  }
  render();
}

// ใช้ text/plain เป็น content-type เพื่อเลี่ยง CORS preflight ที่ Apps Script จัดการไม่ได้
async function postToSheet_(payload){
  const res = await fetch(APPS_SCRIPT_URL, {
    method:'POST',
    headers:{'Content-Type':'text/plain;charset=utf-8'},
    body: JSON.stringify(payload),
  });
  return res.json();
}

async function createTaskRemote(task){
  await postToSheet_({ action:'create', task });
}
async function updateTaskRemote(task){
  await postToSheet_({ action:'update', task });
}
async function deleteTaskRemote(id){
  await postToSheet_({ action:'delete', id });
}

function openModal(task){
  editingTask = task || null;
  const t = task || {id:null, title:'', desc:'', status:'idea', assignee:'', due:''};
  const root = document.getElementById('modal-root');
  root.innerHTML = `
    <div class="overlay" id="overlay">
      <div class="modal">
        <h3>${task ? 'แก้ไขงาน' : 'เพิ่มงานใหม่'}</h3>
        ${t.drive_folder_url ? `<a class="drive-link" href="${escapeAttr(t.drive_folder_url)}" target="_blank" rel="noopener">📁 เปิดโฟลเดอร์เอกสารประกอบ</a>` : (task ? `<div class="drive-link-pending">📁 ยังไม่มีโฟลเดอร์ — กด "บันทึก" เพื่อสร้างให้อัตโนมัติ</div>` : '')}
        <div class="field">
          <label>ชื่องาน</label>
          <input id="f-title" value="${escapeAttr(t.title)}" placeholder="เช่น สกู๊ปราคาทุเรียนหลงลับแลประจำสัปดาห์">
        </div>
        <div class="field">
          <label>รายละเอียด</label>
          <textarea id="f-desc" placeholder="รายละเอียดเพิ่มเติม (ไม่บังคับ)">${escapeHtml(t.desc||'')}</textarea>
        </div>
        <div class="field">
          <label>สถานะ</label>
          <select id="f-status">
            ${STATUSES.map(s=>`<option value="${s.id}" ${t.status===s.id?'selected':''}>${s.label}</option>`).join('')}
          </select>
        </div>
        <div class="field">
          <label>ผู้รับผิดชอบ</label>
          <input id="f-assignee" value="${escapeAttr(t.assignee||'')}" placeholder="ชื่อคนทำงาน">
        </div>
        <div class="field">
          <label>กำหนดส่ง</label>
          <input id="f-due" type="date" value="${t.due||''}">
        </div>
        <div id="modal-err" class="err"></div>
        <div class="modal-actions">
          ${task ? '<button class="btn btn-danger" id="btn-delete">ลบ</button>' : ''}
          <button class="btn btn-ghost" id="btn-cancel">ยกเลิก</button>
          <button class="btn btn-primary" id="btn-save">บันทึก</button>
        </div>
      </div>
    </div>
  `;
  document.getElementById('overlay').addEventListener('click', (e)=>{ if(e.target.id==='overlay') closeModal(); });
  document.getElementById('btn-cancel').addEventListener('click', closeModal);
  document.getElementById('btn-save').addEventListener('click', ()=>submitTask(t.id));
  const delBtn = document.getElementById('btn-delete');
  if(delBtn) delBtn.addEventListener('click', ()=>deleteTask(t.id));
}

function closeModal(){
  document.getElementById('modal-root').innerHTML = '';
  editingTask = null;
}

function escapeHtml(s){ return (s||'').replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function escapeAttr(s){ return escapeHtml(s); }

async function submitTask(existingId){
  const title = document.getElementById('f-title').value.trim();
  if(!title){
    document.getElementById('modal-err').textContent = 'กรุณาใส่ชื่องาน';
    return;
  }
  const data = {
    id: existingId || uid(),
    title,
    desc: document.getElementById('f-desc').value.trim(),
    status: document.getElementById('f-status').value,
    assignee: document.getElementById('f-assignee').value.trim(),
    due: document.getElementById('f-due').value,
    updated_at: new Date().toISOString().slice(0,10),
  };
  const saveBtn = document.getElementById('btn-save');
  saveBtn.textContent = 'กำลังบันทึก…'; saveBtn.disabled = true;
  try{
    if(existingId){
      await updateTaskRemote(data);
      tasks = tasks.map(t => t.id===existingId ? data : t);
    }else{
      await createTaskRemote(data);
      tasks.push(data);
    }
    closeModal();
    render();
  }catch(e){
    document.getElementById('modal-err').textContent = 'บันทึกไม่สำเร็จ ลองใหม่อีกครั้ง';
    saveBtn.textContent = 'บันทึก'; saveBtn.disabled = false;
  }
}

async function deleteTask(id){
  try{
    await deleteTaskRemote(id);
    tasks = tasks.filter(t=>t.id!==id);
    closeModal();
    render();
  }catch(e){
    document.getElementById('modal-err').textContent = 'ลบไม่สำเร็จ ลองใหม่อีกครั้ง';
  }
}

function isOverdue(due, status){
  if(!due || status==='done') return false;
  const today = new Date(); today.setHours(0,0,0,0);
  return new Date(due) < today;
}

function renderStatsBar(){
  const done = tasks.filter(t=>t.status==='done').length;
  const pending = tasks.length - done;
  return `
    <div class="stats-bar">
      <div class="stat-chip total"><span class="num">${tasks.length}</span><span class="lbl">ทั้งหมด</span></div>
      <div class="stat-chip pending"><span class="num">${pending}</span><span class="lbl">ค้างอยู่ในระบบ</span></div>
      ${STATUSES.map(s=>{
        const count = tasks.filter(t=>t.status===s.id).length;
        return `<div class="stat-chip" style="--chip-color:${s.color}"><span class="num">${count}</span><span class="lbl">${s.label}</span></div>`;
      }).join('')}
    </div>
  `;
}

// ---------- Pull system: identity, filter, quick actions ----------

function getMyName_(){
  let name = localStorage.getItem('myName') || '';
  if(!name){
    name = (prompt('ใส่ชื่อของคุณ (จำไว้ในเครื่องนี้ ใช้ตอนหยิบงาน)') || '').trim();
    if(name) localStorage.setItem('myName', name);
  }
  return name;
}

let boardFilter = 'all'; // all | mine | pool

// อัปเดต task ทันทีบนหน้าจอ (ไม่รอ Apps Script ตอบ เพราะช้า) แล้วค่อยยิงอัปเดตจริงเบื้องหลัง
function optimisticUpdateTask(taskId, patch){
  const t = tasks.find(x=>x.id===taskId);
  if(!t) return;
  Object.assign(t, patch, { updated_at: new Date().toISOString().slice(0,10) });
  render();
  updateTaskRemote(t).catch(e=>console.error('update failed', e));
}

function claimTask(taskId){
  const name = getMyName_();
  if(!name) return;
  optimisticUpdateTask(taskId, { assignee: name });
}

function releaseTask(taskId){
  optimisticUpdateTask(taskId, { assignee: '' });
}

function quickAdvance(taskId){
  const t = tasks.find(x=>x.id===taskId);
  if(!t) return;
  const idx = STATUSES.findIndex(s=>s.id===t.status);
  const next = STATUSES[idx+1];
  if(next) optimisticUpdateTask(taskId, { status: next.id });
}

function renderBoard(){
  const root = document.getElementById('root');

  const visibleTasks = tasks.filter(t=>{
    if(boardFilter==='mine') return t.assignee && t.assignee===localStorage.getItem('myName');
    if(boardFilter==='pool') return !t.assignee;
    return true;
  });

  root.innerHTML = `
    ${renderStatsBar()}
    <div class="hint">ลากการ์ดข้ามช่อง หรือกดปุ่มบนการ์ดเพื่อเปลี่ยนสถานะ — แตะที่เหลือของการ์ดเพื่อแก้ไขรายละเอียด</div>
    <div class="pool-filter">
      <button class="pf-btn ${boardFilter==='all'?'active':''}" data-filter="all">ทั้งหมด</button>
      <button class="pf-btn ${boardFilter==='pool'?'active':''}" data-filter="pool">🛒 ตลาดกลาง (ยังไม่มีคนหยิบ)</button>
      <button class="pf-btn ${boardFilter==='mine'?'active':''}" data-filter="mine">👤 งานของฉัน</button>
    </div>
    <div class="board">
      ${STATUSES.map((col, idx)=>{
        const colTasks = visibleTasks.filter(t=>t.status===col.id);
        const next = STATUSES[idx+1];
        return `
        <div class="column" data-status="${col.id}">
          <div class="column-head" style="--col-color:${col.color}">
            <div>
              <h3>${idx+1}. ${col.label}</h3>
              <div class="next-hint ${next ? '' : 'final'}">${next ? '→ ' + next.label : '🏁 จบขั้นตอน'}</div>
            </div>
            <span class="count">${colTasks.length}</span>
          </div>
          <div class="column-body" data-status="${col.id}">
            ${colTasks.length===0 ? '<div class="empty-col">ยังไม่มีงาน</div>' :
              colTasks.map(t=>{
                const overdue = isOverdue(t.due, t.status);
                const nextStatus = STATUSES[idx+1];
                return `
                <div class="card" draggable="true" style="--cat-color:${col.color}" data-id="${t.id}">
                  <div class="title">${escapeHtml(t.title)}</div>
                  <div class="meta">
                    <span class="${t.assignee?'':'unclaimed'}">${t.assignee ? '👤 '+escapeHtml(t.assignee) : 'ว่าง — ยังไม่มีคนหยิบ'}</span>
                    <span class="due ${overdue?'overdue':''}">${t.due ? formatDateShort(t.due) : ''}</span>
                  </div>
                  <div class="card-actions">
                    ${t.assignee
                      ? `<button class="card-btn" data-action="release">🔁 คืนงาน</button>`
                      : `<button class="card-btn claim" data-action="claim">👤 หยิบงานนี้</button>`}
                    ${nextStatus ? `<button class="card-btn advance" data-action="advance">→ ${nextStatus.label}</button>` : ''}
                  </div>
                </div>`;
              }).join('')
            }
          </div>
        </div>`;
      }).join('')}
    </div>
  `;

  root.querySelectorAll('.pf-btn').forEach(btn=>{
    btn.addEventListener('click', ()=>{ boardFilter = btn.dataset.filter; renderBoard(); });
  });

  root.querySelectorAll('.card').forEach(card=>{
    const id = card.dataset.id;

    card.addEventListener('click', (e)=>{
      if(e.target.closest('.card-btn')) return; // ปุ่ม action ไม่เปิด modal
      openModal(tasks.find(x=>x.id===id));
    });

    card.addEventListener('dragstart', (e)=>{
      e.dataTransfer.setData('text/plain', id);
      card.classList.add('dragging');
    });
    card.addEventListener('dragend', ()=> card.classList.remove('dragging'));

    const claimBtn = card.querySelector('[data-action="claim"]');
    if(claimBtn) claimBtn.addEventListener('click', (e)=>{ e.stopPropagation(); claimTask(id); });

    const releaseBtn = card.querySelector('[data-action="release"]');
    if(releaseBtn) releaseBtn.addEventListener('click', (e)=>{ e.stopPropagation(); releaseTask(id); });

    const advanceBtn = card.querySelector('[data-action="advance"]');
    if(advanceBtn) advanceBtn.addEventListener('click', (e)=>{ e.stopPropagation(); quickAdvance(id); });
  });

  root.querySelectorAll('.column-body').forEach(colBody=>{
    colBody.addEventListener('dragover', (e)=>{
      e.preventDefault();
      colBody.classList.add('drag-over');
    });
    colBody.addEventListener('dragleave', ()=> colBody.classList.remove('drag-over'));
    colBody.addEventListener('drop', (e)=>{
      e.preventDefault();
      colBody.classList.remove('drag-over');
      const id = e.dataTransfer.getData('text/plain');
      const newStatus = colBody.dataset.status;
      const t = tasks.find(x=>x.id===id);
      if(t && t.status!==newStatus) optimisticUpdateTask(id, { status: newStatus });
    });
  });
}

function formatDateShort(iso){
  const d = new Date(iso);
  return d.toLocaleDateString('th-TH', {day:'numeric', month:'short'});
}

function renderCalendar(){
  const root = document.getElementById('root');
  const year = calMonth.getFullYear();
  const month = calMonth.getMonth();
  const firstDay = new Date(year, month, 1);
  const startOffset = firstDay.getDay();
  const daysInMonth = new Date(year, month+1, 0).getDate();
  const daysInPrevMonth = new Date(year, month, 0).getDate();
  const todayStr = new Date().toDateString();

  let cells = [];
  for(let i=startOffset-1;i>=0;i--){
    cells.push({day: daysInPrevMonth-i, outside:true, date:null});
  }
  for(let d=1; d<=daysInMonth; d++){
    const dateObj = new Date(year, month, d);
    cells.push({day:d, outside:false, date: dateObj});
  }
  while(cells.length % 7 !== 0){
    cells.push({day: cells.length - (startOffset+daysInMonth) + 1, outside:true, date:null});
  }

  root.innerHTML = `
    <div class="cal-head">
      <button id="cal-prev">‹</button>
      <h2>${THAI_MONTHS[month]} ${year+543}</h2>
      <button id="cal-next">›</button>
      <a class="cal-gcal-link" href="${CALENDAR_EMBED_URL}" target="_blank" rel="noopener">🔗 เปิดใน Google Calendar</a>
    </div>
    <div class="cal-grid">
      ${THAI_DOW.map(d=>`<div class="cal-dow">${d}</div>`).join('')}
      ${cells.map(c=>{
        const isToday = c.date && c.date.toDateString()===todayStr;
        const iso = c.date ? c.date.toISOString().slice(0,10) : null;
        const dayTasks = iso ? tasks.filter(t=>t.due===iso) : [];
        return `
        <div class="cal-cell ${c.outside?'outside':''} ${isToday?'today':''}">
          <div class="cal-daynum">${c.day}</div>
          ${dayTasks.map(t=>{
            const st = statusInfo(t.status);
            return `<div class="cal-task" style="--cat-color:${st.color}" data-id="${t.id}">${escapeHtml(t.title)}</div>`;
          }).join('')}
        </div>`;
      }).join('')}
    </div>
  `;
  document.getElementById('cal-prev').addEventListener('click', ()=>{ calMonth = new Date(year, month-1, 1); renderCalendar(); });
  document.getElementById('cal-next').addEventListener('click', ()=>{ calMonth = new Date(year, month+1, 1); renderCalendar(); });
  root.querySelectorAll('.cal-task').forEach(el=>{
    el.addEventListener('click', ()=>{
      const t = tasks.find(x=>x.id===el.dataset.id);
      openModal(t);
    });
  });
}

function render(){
  if(view==='board') renderBoard();
  else if(view==='cal') renderCalendar();
  else renderFeed();
}

function switchView(next){
  view = next;
  ['board','cal','feed'].forEach(v=>{
    document.getElementById('btn-'+v).classList.toggle('active', v===next);
  });
  render();
}

document.getElementById('btn-board').addEventListener('click', ()=>switchView('board'));
document.getElementById('btn-cal').addEventListener('click', ()=>switchView('cal'));
document.getElementById('btn-feed').addEventListener('click', ()=>switchView('feed'));
document.getElementById('btn-add').addEventListener('click', ()=>openModal(null));

const LOGO_SRC = document.querySelector('.brand-logo').src;
const NEWS_LIKE_URL = NEWS_FEED_URL + '/like';

async function likeNews(id, btnEl){
  const item = feedItems.find(x=>x.id===id);
  if(!item) return;
  item.likes = (item.likes||0) + 1;
  if(btnEl){ btnEl.textContent = `👍 ถูกใจ (${item.likes})`; btnEl.disabled = true; }
  try{
    await fetch(NEWS_LIKE_URL, {
      method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({id}),
    });
  }catch(e){ console.error('like failed', e); }
}

async function addNewsAsTask(id, btnEl){
  const item = feedItems.find(x=>x.id===id);
  if(!item) return;
  const task = {
    id: uid(),
    title: item.title,
    desc: (item.reason ? item.reason + '\n\n' : '') + 'ที่มา: ' + (item.url || ''),
    status: 'idea',
    assignee: '',
    due: '',
    updated_at: new Date().toISOString().slice(0,10),
  };
  if(btnEl){ btnEl.disabled = true; btnEl.textContent = 'กำลังเพิ่ม…'; }
  try{
    await createTaskRemote(task);
    tasks.push(task);
    if(btnEl){ btnEl.textContent = '✓ เพิ่มแล้ว'; }
  }catch(e){
    console.error('add task failed', e);
    if(btnEl){ btnEl.disabled = false; btnEl.textContent = '➕ เพิ่มเป็นงาน'; }
  }
}

function timeAgo_(iso){
  if(!iso) return '';
  const diffMs = Date.now() - new Date(iso).getTime();
  const mins = Math.floor(diffMs/60000);
  if(mins < 1) return 'เมื่อสักครู่';
  if(mins < 60) return `${mins} นาทีที่แล้ว`;
  const hours = Math.floor(mins/60);
  if(hours < 24) return `${hours} ชม.ที่แล้ว`;
  const days = Math.floor(hours/24);
  return `${days} วันที่แล้ว`;
}

async function loadFeed(reset){
  if(feedLoading) return;
  feedLoading = true;
  if(reset){ feedItems = []; feedNextCursor = null; }

  const url = new URL(NEWS_FEED_URL);
  url.searchParams.set('limit', '20');
  if(feedNextCursor) url.searchParams.set('before', feedNextCursor);

  try{
    const res = await fetch(url);
    const data = await res.json();
    if(data && data.ok){
      feedItems = feedItems.concat(data.items || []);
      feedNextCursor = data.next_before || null;
    }
  }catch(e){
    console.error('load feed failed', e);
  }
  feedLoading = false;
  renderFeed();
}

function renderFeed(){
  const root = document.getElementById('root');

  if(feedItems.length === 0 && !feedLoading){
    root.innerHTML = `<div class="loading">กำลังโหลดข่าว…</div>`;
    loadFeed(true);
    return;
  }

  root.innerHTML = `
    <div class="hint" style="max-width:520px; margin-left:auto; margin-right:auto;">ฟีดข่าวที่ระบบกรองแล้วว่าเกี่ยวข้อง — เรียงใหม่สุดก่อน</div>
    <div class="news-feed">
      ${feedItems.map(item=>{
        const color = NEWS_CATEGORY_COLORS[item.category] || 'var(--gold)';
        const link = escapeAttr(item.url || '#');
        return `
        <div class="news-card" style="--cat-color:${color}" data-id="${item.id}">
          <div class="news-card-head">
            <img class="news-avatar" src="${LOGO_SRC}" alt="">
            <div class="news-headtext">
              <div class="news-page-name">ทีมสื่ออุตรดิตถ์ <span class="news-cat">${escapeHtml(item.category||'')}</span></div>
              <div class="news-time">${timeAgo_(item.created_at)} · 🌐</div>
            </div>
          </div>
          <div class="news-title">${escapeHtml(item.title||'')}</div>
          ${item.image_url
            ? `<a class="news-media" href="${link}" target="_blank" rel="noopener"><img src="${escapeAttr(item.image_url)}" alt="" loading="lazy" onerror="this.closest('.news-media').remove()"></a>`
            : `<a class="news-poster" href="${link}" target="_blank" rel="noopener"><span>${escapeHtml(item.title||'')}</span></a>`
          }
          ${item.reason ? `<div class="news-reason">${escapeHtml(item.reason)}</div>` : ''}
          <div class="news-actions">
            <button class="news-action-btn" data-action="like">👍 ถูกใจ${item.likes ? ' ('+item.likes+')' : ''}</button>
            <button class="news-action-btn" data-action="addtask">➕ เพิ่มเป็นงาน</button>
            <a class="news-action-btn" href="${link}" target="_blank" rel="noopener">🔗 อ่านต้นฉบับ</a>
          </div>
        </div>`;
      }).join('')}
    </div>
    ${feedNextCursor ? `<button class="btn btn-ghost load-more-btn" id="btn-load-more">${feedLoading?'กำลังโหลด…':'โหลดเพิ่ม'}</button>` : ''}
  `;

  root.querySelectorAll('.news-card').forEach(card=>{
    const id = card.dataset.id;
    const likeBtn = card.querySelector('[data-action="like"]');
    if(likeBtn) likeBtn.addEventListener('click', ()=>likeNews(id, likeBtn));
    const addBtn = card.querySelector('[data-action="addtask"]');
    if(addBtn) addBtn.addEventListener('click', ()=>addNewsAsTask(id, addBtn));
  });

  const loadMoreBtn = document.getElementById('btn-load-more');
  if(loadMoreBtn) loadMoreBtn.addEventListener('click', ()=>loadFeed(false));
}

loadTasks();
</script>
